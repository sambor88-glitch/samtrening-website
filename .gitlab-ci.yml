# Konfiguracja GitLab CI/CD dla GitLab Pages
# Ten plik mówi GitLabowi: "opublikuj wszystkie pliki jako statyczną stronę"

pages:
  stage: deploy
  script:
    - mkdir -p public
    - cp -r *.html public/ 2>/dev/null || true
    - cp -r blog public/ 2>/dev/null || true
    - cp -r lokalizacje public/ 2>/dev/null || true
    - cp -r docs public/ 2>/dev/null || true
    - echo "Pliki skopiowane. Strona bedzie dostepna po zakonczeniu pipeline."
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
